services:

  api:
    build:
      context: .
      target: runner
    image: taskflow-api:local
    container_name: taskflow-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taskflow-net

  api-test:
    build:
      context: .
      target: test
    image: taskflow-api:test
    container_name: taskflow-api-test
    env_file:
      - .env.test
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/taskflow_test
      NODE_ENV: test
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taskflow-net
    profiles:
      - test

  db:
    image: postgres:16-alpine
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - taskflow-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - taskflow-net

networks:
  taskflow-net:
    driver: bridge

volumes:
  taskflow-db-data: