# /etc/nginx/sites-available/taskflow.conf
#
# Remplace pure.conf : ce même domaine servait auparavant l'app PHP
# (e-commercev2). Il sert maintenant de reverse proxy vers l'API Node
# (TaskFlow), qui tourne dans Docker et n'écoute QUE sur 127.0.0.1:3000
# (voir docker-compose.yml) -> Nginx est le seul point d'entrée public.

server {
    listen 80;
    server_name mid-apptest.bmoinet.net www.mid-apptest.bmoinet.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mid-apptest.bmoinet.net www.mid-apptest.bmoinet.net;

    client_max_body_size 10M;

    access_log /var/log/nginx/taskflow_access.log;
    error_log  /var/log/nginx/taskflow_error.log;

    # --- SSL : on réutilise le certificat existant, inchangé ---
    ssl_certificate     /etc/bmoi_key/bmoifull.pem;
    ssl_certificate_key /etc/bmoi_key/bmoiprivatenopass.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- En-têtes de sécurité de base (complètent Helmet côté app) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Reverse proxy vers l'API Node (conteneur Docker) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Nécessaire pour que req.ip, les logs et X-Forwarded-* soient
        # corrects côté Express (sinon Nginx apparaît comme seul client).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # --- Sécurité : bloque l'accès à tout fichier caché (.env, .git...) ---
    # Filet de sécurité : Node ne sert de toute façon aucun fichier statique
    # ici, mais ça reste une bonne pratique de défense en profondeur.
    location ~ /\. {
        deny all;
    }
}
