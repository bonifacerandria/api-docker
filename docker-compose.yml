services:
  api:
    build:
      context: .
      target: runner
    image: taskflow-api:local
    container_name: taskflow-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Surcharge la valeur de .env (qui pointe vers "localhost" pour un usage
      # hors Docker) : dans le réseau taskflow-net, PostgreSQL est joignable
      # via le nom du service "db", pas "localhost".
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      # Exposé pour l'instant pour tester directement. Au module 6, Nginx
      # deviendra le seul point d'entrée public et ce port ne sera plus
      # mappé vers l'extérieur (uniquement accessible via le réseau interne
      # taskflow-net).
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taskflow-net

  db:
    image: postgres:16-alpine
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - taskflow-db-data:/var/lib/postgresql/data
    ports:
      # IMPORTANT (VM Azure avec IP publique) : on bind sur 127.0.0.1 et non
      # 0.0.0.0. Sans ça, le port 5432 serait potentiellement joignable
      # depuis Internet dès qu'une règle NSG l'autoriserait par erreur.
      # Cette restriction locale est une deuxième ligne de défense.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - taskflow-net

networks:
  taskflow-net:
    driver: bridge

volumes:
  taskflow-db-data:
    driver: local
